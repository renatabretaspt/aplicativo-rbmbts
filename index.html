<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBMBTS - Powered by RBMSoluções</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-rbm-red { background-color: #E60023; }
        .text-rbm-red { color: #E60023; }
        .border-rbm-red { border-color: #E60023; }
    </style>
</head>
<body class="bg-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function RBMBTSApp() {
            const [gameState, setGameState] = useState('HOME');

            // Lógica para detectar /admin ou ?admin=true
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                if (window.location.pathname === '/admin' || params.get('admin') === 'true') {
                    setGameState('ADMIN');
                }
            }, []);

            // --- PAINEL ADMIN RBMSOLUÇÕES ---
            if (gameState === 'ADMIN') {
                return (
                    <div className="min-h-screen bg-gray-50 flex items-center justify-center p-4">
                        <div className="max-w-4xl w-full bg-white rounded-[40px] shadow-2xl border-2 border-rbm-red overflow-hidden">
                            <div className="bg-rbm-red p-8 text-white flex justify-between items-center">
                                <div>
                                    <h1 className="text-3xl font-black tracking-tighter">PAINEL ADMIN RBMBTS</h1>
                                    <p className="text-xs font-bold opacity-80 uppercase tracking-widest">Controle Central RBMSoluções</p>
                                </div>
                                <button onClick={() => window.location.href='/'} className="bg-white text-rbm-red px-6 py-2 rounded-full font-bold text-sm shadow-lg">SAIR</button>
                            </div>
                            
                            <div className="p-10 grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div className="space-y-6">
                                    <div className="p-6 bg-red-50 rounded-3xl border border-red-100">
                                        <h3 className="font-black text-rbm-red mb-4 uppercase text-sm">Configuração de Maratona</h3>
                                        <p className="text-gray-600 text-sm font-medium">Status: <span className="text-green-500 font-black">25 PERGUNTAS / ATIVO</span></p>
                                        <p className="text-gray-600 text-sm font-medium mt-2">Dificuldade: <span className="font-black italic">Progressiva (6 Fases)</span></p>
                                    </div>
                                    <div className="p-6 bg-gray-50 rounded-3xl border border-gray-100">
                                        <h3 className="font-black text-gray-400 mb-4 uppercase text-sm italic">Monetização Premium</h3>
                                        <div className="flex gap-4">
                                            <div className="flex-1 bg-white p-4 rounded-2xl shadow-sm border border-gray-100 text-center">
                                                <p className="text-[10px] font-bold text-gray-400 uppercase">Brasil</p>
                                                <p className="text-xl font-black text-gray-800">R$ 9,99</p>
                                            </div>
                                            <div className="flex-1 bg-white p-4 rounded-2xl shadow-sm border border-gray-100 text-center">
                                                <p className="text-[10px] font-bold text-gray-400 uppercase">Global</p>
                                                <p className="text-xl font-black text-gray-800">€ 10.00</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white p-8 rounded-3xl border-2 border-gray-50 space-y-4">
                                    <h3 className="font-black text-gray-800 mb-4">Branding & Logo</h3>
                                    <label className="block text-[10px] font-black text-gray-400 uppercase">URL da Logomarca (RMBTS)</label>
                                    <input type="text" className="w-full p-3 bg-gray-50 rounded-xl border border-gray-100 text-sm outline-none focus:border-rbm-red" value="https://rbmbts.pt/logo.png" readOnly />
                                    <div className="flex items-center gap-4 py-4">
                                        <div className="w-12 h-12 bg-rbm-red rounded-xl shadow-lg border-2 border-white"></div>
                                        <span className="font-mono text-gray-400 text-xs">#E60023</span>
                                    </div>
                                    <button className="w-full py-4 bg-rbm-red text-white rounded-2xl font-black shadow-xl shadow-red-100 uppercase tracking-widest text-sm hover:scale-105 transition-transform">Salvar Alterações</button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // --- TELA INICIAL (HOME) ---
            return (
                <div className="min-h-screen bg-white flex flex-col items-center justify-center p-6 text-center">
                    <img src="https://i.postimg.cc/T3m8C3Ym/rbmbts-logo.png" alt="RBMBTS" className="w-32 mb-6" />
                    <h1 className="text-5xl font-black text-rbm-red mb-2 tracking-tighter">RBMBTS</h1>
                    <p className="text-gray-400 font-bold text-[10px] uppercase mb-12 tracking-[0.3em] italic">Powered by RBMSoluções</p>
                    
                    <div className="w-full max-w-sm bg-white border-4 border-red-50 p-8 rounded-[40px] shadow-2xl shadow-red-100">
                        <h2 className="font-black text-2xl mb-1 text-gray-900">MARATONA DIÁRIA</h2>
                        <p className="text-gray-400 font-bold text-xs mb-8 uppercase tracking-widest">25 Perguntas • Fase 1</p>
                        
                        <button 
                            onClick={() => window.location.reload()}
                            className="w-full py-5 bg-rbm-red text-white rounded-2xl font-black text-xl shadow-xl shadow-red-200 active:scale-95 transition-transform uppercase"
                        >
                            JOGAR AGORA
                        </button>
                        
                        <div className="mt-8 pt-6 border-t border-gray-50">
                            <p className="text-[9px] text-gray-300 font-bold uppercase tracking-widest leading-relaxed">
                                1 Quiz Grátis a cada 24 horas<br/>
                                Acesso Ilimitado: <span className="text-rbm-red italic">R$ 9,99 / € 10,00</span>
                            </p>
                        </div>
                    </div>
                    
                    {/* Botão Secreto para o Diretor (Invisível para o ARMY) */}
                    <button onClick={() => setGameState('ADMIN')} className="mt-12 opacity-5 text-[8px] uppercase font-bold tracking-[0.5em] hover:opacity-100 transition-opacity">
                        Admin RBMSoluções
                    </button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RBMBTSApp />);
    </script>
</body>
</html>

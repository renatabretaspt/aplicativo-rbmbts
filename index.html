<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBMBTS - O Desafio Oficial (RBMSoluções)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #fff; margin: 0; }
        .bg-rbm-red { background-color: #E60023; }
        .text-rbm-red { color: #E60023; }
        .border-rbm-red { border-color: #E60023; }
        .animate-fade { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- BANCO DE DADOS MESTRE (RBMSoluções) ---
        // Aqui temos um pool maior. O sistema escolherá 25 aleatórias.
        const MASTER_POOL = [
            { q: "Qual a data do debut oficial do BTS?", a: "13/06/2013", o: ["13/06/2013", "12/06/2013", "13/07/2013", "09/07/2013"], h: "O Início!", s: "BigHit", lvl: 1 },
            { q: "Quem é o líder do BTS?", a: "RM", o: ["RM", "Jin", "Suga", "J-Hope"], h: "Liderança!", s: "Perfil Oficial", lvl: 1 },
            { q: "Qual o nome real do V?", a: "Kim Tae-hyung", o: ["Kim Tae-hyung", "Park Ji-min", "Jeon Jung-kook", "Kim Seok-jin"], h: "Identidade!", s: "Perfil Oficial", lvl: 1 },
            { q: "Qual música deu o primeiro win ao BTS?", a: "I Need U", o: ["I Need U", "No More Dream", "Dope", "Danger"], h: "Vitória!", s: "The Show", lvl: 2 },
            { q: "Em que cidade nasceu o Jimin?", a: "Busan", o: ["Busan", "Daegu", "Gwangju", "Seul"], h: "Origens!", s: "Fansign", lvl: 2 },
            { q: "O que significa a sigla A.R.M.Y?", a: "Adorable Representative M.C. for Youth", o: ["Adorable Representative M.C. for Youth", "Amazing Real Music Youth", "Always Ready My Youth", "Army Real Modern Youth"], h: "Família!", s: "Weverse", lvl: 2 },
            { q: "Qual o nome real do Suga?", a: "Min Yoon-gi", o: ["Min Yoon-gi", "Jung Ho-seok", "Kim Nam-joon", "Park Ji-min"], h: "Gênio!", s: "Perfil Oficial", lvl: 3 },
            { q: "Qual a cor que o V associou ao amor?", a: "Roxo", o: ["Roxo", "Vermelho", "Azul", "Amarelo"], h: "Borahae!", s: "3rd Muster", lvl: 3 },
            { q: "Quem lançou a música 'Daechwita'?", a: "Agust D", o: ["Agust D", "RM", "J-Hope", "Jimin"], h: "Solo!", s: "D-2 Mixtape", lvl: 4 },
            { q: "Qual música foi gravada com a Halsey?", a: "Boy With Luv", o: ["Boy With Luv", "Dynamite", "Butter", "Idol"], h: "Colaboração!", s: "Billboard", lvl: 4 },
            { q: "Em que ano o BTS foi à ONU pela primeira vez?", a: "2018", o: ["2018", "2017", "2019", "2020"], h: "Discurso!", s: "UNICEF", lvl: 5 },
            { q: "Qual o nome do reality show do BTS?", a: "Run BTS", o: ["Run BTS", "BTS GO", "Bangtan TV", "Idol Room"], h: "Diversão!", s: "Weverse", lvl: 5 },
            { q: "Qual o nome do álbum de debut?", a: "2 Cool 4 Skool", o: ["2 Cool 4 Skool", "Dark & Wild", "Wings", "BE"], h: "História!", s: "Discografia", lvl: 6 },
            { q: "Qual a primeira música totalmente em inglês?", a: "Dynamite", o: ["Dynamite", "Butter", "Permission to Dance", "Stay Gold"], h: "#1 Billboard!", s: "Hot 100", lvl: 6 }
        ];

        // Função de Embaralhar (Fisher-Yates)
        const shuffle = (array) => {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        };

        function RBMBTS_App() {
            const [view, setView] = useState('HOME');
            const [questions, setQuestions] = useState([]);
            const [step, setStep] = useState(0);
            const [score, setScore] = useState(0);
            const [currentOptions, setCurrentOptions] = useState([]);
            const [selected, setSelected] = useState(null);
            const [correct, setCorrect] = useState(null);

            // Iniciar Maratona com 25 questões aleatórias
            const startQuiz = () => {
                // Sorteia 25 do pool (aqui simulamos com o pool completo embaralhado)
                const sessionBatch = shuffle(MASTER_POOL).slice(0, 25);
                // Se o pool for menor que 25, duplicamos para teste
                while(sessionBatch.length < 25) {
                    sessionBatch.push(...shuffle(MASTER_POOL).slice(0, 25 - sessionBatch.length));
                }
                setQuestions(sessionBatch);
                setStep(0);
                setScore(0);
                setSelected(null);
                setCorrect(null);
                setView('PLAYING');
            };

            // Embaralha as opções toda vez que o STEP muda
            useEffect(() => {
                if (view === 'PLAYING' && questions[step]) {
                    setCurrentOptions(shuffle(questions[step].o));
                }
            }, [step, view, questions]);

            const handleOption = (opt) => {
                if (correct !== null) return;
                const isRight = opt === questions[step].a;
                setSelected(opt);
                setCorrect(isRight);
                if (isRight) setScore(score + 100);
            };

            const nextStep = () => {
                if (step < 24) {
                    setStep(step + 1);
                    setSelected(null);
                    setCorrect(null);
                } else {
                    setView('RESULT');
                }
            };

            if (view === 'RESULT') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-8 text-center bg-white animate-fade">
                    <img src="https://i.postimg.cc/T3m8C3Ym/rbmbts-logo.png" className="w-24 mb-6" />
                    <h1 className="text-4xl font-black text-[#E60023] mb-4 tracking-tighter italic">MARATONA CONCLUÍDA!</h1>
                    <div className="text-7xl font-black text-gray-900 mb-8">{score} <span className="text-2xl text-[#E60023]">XP</span></div>
                    <button onClick={startQuiz} className="w-full max-w-xs py-5 bg-[#E60023] text-white rounded-2xl font-black text-xl shadow-xl shadow-red-200">NOVA MARATONA</button>
                    <p className="mt-8 text-[10px] text-gray-400 font-bold uppercase tracking-widest leading-relaxed">Powered by RBMSoluções</p>
                </div>
            );

            if (view === 'HOME') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center animate-fade bg-white">
                    <img src="https://i.postimg.cc/T3m8C3Ym/rbmbts-logo.png" className="w-32 mb-6" />
                    <h1 className="text-5xl font-black text-[#E60023] mb-2 tracking-tighter italic uppercase">RBMBTS</h1>
                    <p className="text-gray-400 font-bold text-[10px] uppercase mb-12 tracking-[0.4em]">RBMSoluções</p>
                    <div className="w-full max-w-sm bg-white border-4 border-red-50 p-10 rounded-[40px] shadow-2xl shadow-red-100 flex flex-col items-center">
                        <h2 className="font-black text-2xl mb-1 text-gray-900 tracking-tight">DESAFIO DIÁRIO</h2>
                        <p className="text-gray-400 font-bold text-xs mb-8 uppercase tracking-widest">25 Perguntas • 6 Fases</p>
                        <button onClick={startQuiz} className="w-full py-5 bg-[#E60023] text-white rounded-2xl font-black text-xl shadow-xl shadow-red-200 uppercase tracking-widest active:scale-95 transition-transform">JOGAR AGORA</button>
                    </div>
                </div>
            );

            const q = questions[step];
            if (!q) return null;

            return (
                <div className="min-h-screen bg-white flex flex-col max-w-md mx-auto relative animate-fade border-x border-gray-50 shadow-2xl overflow-hidden">
                    <header className="p-6 border-b border-gray-100 sticky top-0 bg-white z-20">
                        <div className="flex justify-between items-center mb-4 px-2 text-[10px] font-black uppercase tracking-widest">
                            <span className="text-[#E60023]">Fase {Math.ceil((step + 1)/4.2)}</span>
                            <span className="text-gray-400">{step + 1}/25</span>
                        </div>
                        <div className="h-1.5 w-full bg-gray-50 rounded-full overflow-hidden">
                            <div className="h-full bg-[#E60023] transition-all duration-700" style={{width: `${((step + 1) / 25) * 100}%`}}></div>
                        </div>
                    </header>

                    <main className="p-8 flex-grow">
                        <div className="mb-8">
                            <p className="text-[#E60023] font-black text-[10px] mb-2 uppercase tracking-widest italic flex items-center gap-2">
                                <span className="w-1.5 h-1.5 bg-[#E60023] rounded-full animate-pulse"></span> {q.h}
                            </p>
                            <h2 className="text-2xl font-black text-gray-900 leading-tight tracking-tight">{q.q}</h2>
                        </div>

                        <div className="space-y-4">
                            {currentOptions.map((opt, i) => (
                                <button 
                                    key={i}
                                    onClick={() => handleOption(opt)}
                                    className={`w-full p-5 text-left rounded-2xl border-2 font-bold transition-all duration-300 flex items-center justify-between
                                        ${selected === opt ? (opt === q.a ? 'border-green-500 bg-green-50 text-green-700' : 'border-[#E60023] bg-red-50 text-[#E60023]') : 'border-gray-50 bg-white text-gray-700 hover:border-red-100'}`}
                                >
                                    <span className="flex-1 pr-4">{opt}</span>
                                    {correct !== null && opt === q.a && <span className="text-green-500 font-black">✓</span>}
                                </button>
                            ))}
                        </div>
                    </main>

                    {correct !== null && (
                        <footer className="p-6 bg-white border-t border-gray-100 animate-slide-up sticky bottom-0 shadow-2xl">
                            <div className="mb-4 text-[10px] text-gray-400 font-bold uppercase italic tracking-tighter">
                                <span className="text-[#E60023]">FONTE OFICIAL:</span> {q.s}
                            </div>
                            <button onClick={nextStep} className="w-full py-5 bg-[#E60023] text-white rounded-2xl font-black text-xl shadow-xl shadow-red-200 uppercase tracking-widest">
                                {step === 24 ? "VER RESULTADO" : "PRÓXIMA PERGUNTA"}
                            </button>
                        </footer>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RBMBTS_App />);
    </script>
</body>
</html>
